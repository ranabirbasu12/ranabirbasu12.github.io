<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ranabir Basu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Open+Sans:wght@400;600;700&family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Open Sans', sans-serif;
      background: #0a0a1a;
      color: #fff;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .greeting {
      text-align: center;
      margin-bottom: 50px;
    }

    .greeting h1 {
      font-family: 'Bebas Neue', cursive;
      font-size: 56px;
      letter-spacing: 3px;
      margin-bottom: 8px;
    }

    .greeting h1 span {
      color: #00bfff;
    }

    .greeting p {
      color: #888;
      font-size: 14px;
    }

    .choices {
      display: flex;
      gap: 40px;
      margin-bottom: 40px;
    }

    .choice {
      width: 320px;
      padding: 40px 30px;
      border-radius: 12px;
      text-align: center;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s, border-color 0.3s;
      text-decoration: none;
      color: #fff;
      position: relative;
    }

    .choice:hover {
      transform: translateY(-4px);
    }

    .choice.classic {
      background: linear-gradient(135deg, #0d1b2a, #1b2d45);
      border: 2px solid #00bfff;
      box-shadow: 0 4px 30px rgba(0, 191, 255, 0.15);
    }

    .choice.classic:hover {
      box-shadow: 0 8px 40px rgba(0, 191, 255, 0.3);
    }

    .choice.classic .default-badge {
      position: absolute;
      top: -10px;
      right: -10px;
      background: #00bfff;
      color: #0a0a1a;
      font-size: 10px;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 20px;
      letter-spacing: 0.5px;
    }

    .choice.game {
      background: linear-gradient(135deg, #1a0a2e, #2d1b45);
      border: 2px solid #555;
      box-shadow: 0 4px 30px rgba(100, 100, 100, 0.1);
    }

    .choice.game:hover {
      border-color: #00ff88;
      box-shadow: 0 8px 40px rgba(0, 255, 136, 0.2);
    }

    .choice-icon {
      font-size: 40px;
      margin-bottom: 16px;
    }

    .choice h2 {
      font-family: 'Bebas Neue', cursive;
      font-size: 26px;
      letter-spacing: 2px;
      margin-bottom: 8px;
    }

    .choice.game h2 {
      font-family: 'Press Start 2P', cursive;
      font-size: 14px;
      line-height: 1.6;
    }

    .choice p {
      font-size: 13px;
      color: #999;
      line-height: 1.5;
    }

    .countdown {
      text-align: center;
      color: #666;
      font-size: 13px;
    }

    .countdown .timer {
      display: inline-block;
      width: 28px;
      height: 28px;
      line-height: 28px;
      border-radius: 50%;
      background: rgba(0, 191, 255, 0.15);
      color: #00bfff;
      font-weight: 700;
      font-size: 14px;
      margin-left: 6px;
      vertical-align: middle;
    }

    .progress-bar {
      width: 200px;
      height: 3px;
      background: #222;
      border-radius: 2px;
      margin: 12px auto 0;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: #00bfff;
      border-radius: 2px;
      width: 100%;
      transition: width 1s linear;
    }

    /* Mobile */
    @media (max-width: 768px) {
      .choices {
        flex-direction: column;
        gap: 20px;
        padding: 0 20px;
      }

      .choice {
        width: 100%;
      }

      .greeting h1 {
        font-size: 40px;
      }
    }
  </style>
</head>
<body>

  <div class="greeting">
    <h1>RANABIR <span>BASU</span></h1>
    <p>Choose your experience</p>
  </div>

  <div class="choices">
    <a href="portfolio/" class="choice classic" id="classicChoice">
      <span class="default-badge">DEFAULT</span>
      <div class="choice-icon">📄</div>
      <h2>PORTFOLIO</h2>
      <p>Clean, professional overview of my journey, experience, and projects.</p>
    </a>

    <a href="quest/" class="choice game" id="gameChoice">
      <div class="choice-icon">🎮</div>
      <h2>QUEST LOG</h2>
      <p>An interactive RPG-style walkthrough of my life. Scroll to explore.</p>
    </a>
  </div>

  <div class="countdown" id="countdown">
    Redirecting to portfolio in <span class="timer" id="timer">5</span>
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
  </div>

  <script>
    var seconds = 5;
    var timerEl = document.getElementById('timer');
    var progressEl = document.getElementById('progressFill');
    var countdownEl = document.getElementById('countdown');
    var cancelled = false;

    // Start progress bar animation
    setTimeout(function () {
      progressEl.style.width = '0%';
    }, 50);

    var interval = setInterval(function () {
      if (cancelled) return;
      seconds--;
      timerEl.textContent = seconds;
      if (seconds <= 0) {
        clearInterval(interval);
        window.location.href = 'portfolio/';
      }
    }, 1000);

    // Cancel countdown if user hovers on game choice
    document.getElementById('gameChoice').addEventListener('mouseenter', function () {
      cancelled = true;
      clearInterval(interval);
      countdownEl.style.opacity = '0';
    });

    // Also cancel on any click (the link will handle navigation)
    document.querySelectorAll('.choice').forEach(function (el) {
      el.addEventListener('click', function () {
        cancelled = true;
        clearInterval(interval);
      });
    });
  </script>

</body>
</html>
